</div><script>if(typeof window.eruda !== "null") { eruda.destroy(); delete window.eruda; } const $ = function(q) { return document.querySelector(q); };function hide() { $("#header").style.display="none"; $("#body").style.display="block"; }; $("#btn").onclick = function() { if($("#pwd").value == "ytaka500491") { hide(); localStorage.setItem("v", "1"); } }; if( localStorage.getItem("v") == "1") { hide(); };
// HTML: <video id="myVideo" src="video.mp4"></video>
//      <button id="toggleBtn">再生 / 一時停止</button>

const video = document.getElementById('vdo');
const btn = document.getElementById('toggleBtn');

btn.addEventListener('click', () => {
  if (video.paused) {
    video.play();
    btn.textContent = '一時停止';
  } else {
    video.pause();
    btn.textContent = '再生';
  }
});


</script></body></html>
