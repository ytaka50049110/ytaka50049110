<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>山手線ゲーム（対戦）</title>
  <style>
    body {
      background: #f5f5f5;
      font-family: "Yu Gothic", sans-serif;
      text-align: center;
    }
    .container {
      width: 90%;
      max-width: 500px;
      margin: 40px auto;
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    button {
      padding: 10px 20px;
      margin: 5px;
      font-size: 16px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      background: #4CAF50;
      color: white;
    }
    button:hover {
      background: #45a049;
    }
    .hidden {
      display: none;
    }
    select {
      width: 80%;
      padding: 10px;
      margin: 10px;
      font-size: 18px;
    }
    #message {
      font-weight: bold;
      margin: 10px;
    }
    #answerList {
      list-style: none;
      padding: 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎮 山手線ゲーム（プレイヤー vs コンピューター）</h1>

    <div id="gameArea">
      <h2>テーマ：山手線の駅名</h2>
      <p>ターン：<span id="turn">プレイヤー</span></p>
      <p>残り時間：<span id="timer">10</span> 秒</p>

      <select id="answerSelect">
        <option value="">駅を選択</option>
      </select>
      <button id="submitBtn">送信</button>

      <p id="message"></p>
      <p>これまでの回答：</p>
      <ul id="answerList"></ul>
    </div>

    <div id="gameOver" class="hidden">
      <h2>ゲームオーバー！</h2>
      <p id="finalScore"></p>
      <button id="restartBtn">もう一度</button>
    </div>
  </div>

  <script>
    const yamanoteStations = [
      "東京","神田","秋葉原","御徒町","上野","鶯谷","日暮里","西日暮里",
      "田端","駒込","巣鴨","大塚","池袋","目白","高田馬場","新大久保",
      "新宿","代々木","原宿","渋谷","恵比寿","目黒","五反田","大崎",
      "品川","高輪ゲートウェイ","田町","浜松町","新橋","有楽町"
    ];

    let usedAnswers = [];
    let timer = 30;
    let timerInterval;
    let isPlayerTurn = true;

    const timerDisplay = document.getElementById("timer");
    const turnDisplay = document.getElementById("turn");
    const message = document.getElementById("message");
    const answerList = document.getElementById("answerList");
    const finalScore = document.getElementById("finalScore");
    const answerSelect = document.getElementById("answerSelect");

    function setupSelect() {
      yamanoteStations.forEach(st => {
        const op = document.createElement("option");
        op.value = st;
        op.textContent = st;
        answerSelect.appendChild(op);
      });
    }

    function startTimer() {
      timer = 30;
      timerDisplay.textContent = timer;

      clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        timer--;
        timerDisplay.textContent = timer;

        if (timer <= 0) {
          gameOver(isPlayerTurn ? "時間切れ（プレイヤーの負け）" : "コンピューターが時間切れ");
        }
      }, 1000);
    }

    function startGame() {
      usedAnswers = [];
      answerList.innerHTML = "";
      message.textContent = "";
      answerSelect.value = "";
      isPlayerTurn = true;
      turnDisplay.textContent = "プレイヤー";

      document.getElementById("gameArea").classList.remove("hidden");
      document.getElementById("gameOver").classList.add("hidden");

      startTimer();
    }

    function addAnswer(name, who) {
      usedAnswers.push(name);
      const li = document.createElement("li");
      li.textContent = `${who}：${name}`;
      answerList.appendChild(li);
    }

    function playerTurn() {
      const answer = answerSelect.value;
      if (!answer) return;

      if (usedAnswers.includes(answer)) {
        gameOver("重複回答（プレイヤーの負け）");
        return;
      }

      addAnswer(answer, "プレイヤー");
      answerSelect.value = "";

      isPlayerTurn = false;
      turnDisplay.textContent = "コンピューター";
      message.textContent = "コンピューターの番…";

      timer = 10;

      setTimeout(computerTurn, 1000);
    }

    function computerTurn() {
      const remaining = yamanoteStations.filter(st => !usedAnswers.includes(st));

      if (remaining.length === 0) {
        gameOver("コンピューターが答えられない → プレイヤーの勝ち！");
        return;
      }

      const choice = remaining[Math.floor(Math.random() * remaining.length)];

      addAnswer(choice, "コンピューター");

      isPlayerTurn = true;
      turnDisplay.textContent = "プレイヤー";
      message.textContent = "あなたの番！";

      timer = 10;
    }

    function gameOver(reason) {
      clearInterval(timerInterval);
      document.getElementById("gameArea").classList.add("hidden");
      document.getElementById("gameOver").classList.remove("hidden");
      finalScore.textContent = reason;
    }

    document.getElementById("submitBtn").onclick = () => {
      if (isPlayerTurn) playerTurn();
    };

    document.getElementById("restartBtn").onclick = startGame;

    window.addEventListener("load", () => {
      setupSelect();
      startGame();
    });
  </script>
</body>
</html>
